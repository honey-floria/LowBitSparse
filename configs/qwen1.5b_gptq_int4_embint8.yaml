# M4 1.5B 关键复现:linears GPTQ INT4 + embedding RTN INT8
# 用于验证 0.5B 推荐量化点是否能迁移到 Qwen2.5-1.5B。
exp_id: m1_gptq_int4_embint8_1.5b
seed: 42
out_dir: results

model:
  name: Qwen/Qwen2.5-1.5B-Instruct
  dtype: float16
  device: cuda

quant:
  method: gptq
  n_bits: 4
  group_size: 128
  symmetric: false
  skip: ["lm_head"]
  calib_n_samples: 128
  calib_seqlen: 512
  quant_embedding: true
  embedding_bits: 8

eval:
  seqlen: 2048
  stride: 2048
  max_samples: null

profile:
  prefill_len: 512
  decode_tokens: 128
