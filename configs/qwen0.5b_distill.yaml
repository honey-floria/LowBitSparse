# M3 配置:Qwen2.5-0.5B 量化感知蒸馏
exp_id: m3_distill_qwen0.5b
seed: 42
out_dir: results

teacher:
  name: Qwen/Qwen2.5-0.5B-Instruct
  dtype: float16
  device: cuda

student:
  name: Qwen/Qwen2.5-0.5B-Instruct
  dtype: float16
  device: cuda

quant:
  method: rtn
  n_bits: 4
  group_size: 128
  symmetric: false
  skip: ["lm_head"]
  quant_embedding: false

distill:
  dataset_id: Salesforce/wikitext
  dataset_config: wikitext-2-raw-v1
  train_split: train
  eval_split: validation
  seqlen: 512
  train_samples: 256
  eval_samples: 32
  batch_size: 2
  max_steps: 100
  eval_every: 20
  log_every: 10
  lr: 5.0e-5
  weight_decay: 0.0
  betas: [0.9, 0.95]
  grad_clip: 1.0
  temperature: 2.0
  alpha_kd: 0.7
  beta_ce: 0.3
  gamma_hidden: 0.0
  use_amp: true
  gradient_checkpointing: false
