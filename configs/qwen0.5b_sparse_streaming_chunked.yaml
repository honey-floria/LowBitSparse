# M2-d 配置:StreamingLLM chunked prefill / local attention
exp_id: m2d_streaming_chunked_s64_w1024_c512
seed: 42
out_dir: results

model:
  name: Qwen/Qwen2.5-0.5B-Instruct
  dtype: float16
  device: cuda

sparse:
  mode: streaming_llm
  window_size: 1024
  sink_size: 64
  block_size: 128
  block_lookback: 1
  cache_pruning: false
  chunked_prefill: true
  prefill_chunk_size: 512
  ring_graph: false
  benchmark_lengths: [2048, 4096, 8192, 16384]

eval:
  max_samples: null

profile:
  decode_tokens: 128
  warmup: 2
  repeats: 5
  # false = 显存峰值包含 chunked prefill,用于验收 prefill memory。
  reset_peak_after_prefill: false
